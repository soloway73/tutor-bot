version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tutor-bot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-tutorbot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tutorbot_password}
      POSTGRES_DB: ${DB_NAME:-tutorbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tutorbot} -d ${DB_NAME:-tutorbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tutor-bot-network

  # Telegram Bot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tutor-bot-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-tutorbot}:${DB_PASSWORD:-tutorbot_password}@postgres:5432/${DB_NAME:-tutorbot}?schema=public
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      GOOGLE_CREDENTIALS: ${GOOGLE_CREDENTIALS}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primary}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tutor-bot-network
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  tutor-bot-network:
    driver: bridge
